<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Clube Náutico da Praia de Mira">
  <defs>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a4d7a"/>
      <stop offset="1" stop-color="#062e49"/>
    </linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7fc4e8"/>
      <stop offset="1" stop-color="#cfeafa"/>
    </linearGradient>
    <path id="ring-top" d="M 100 100 m -78 0 a 78 78 0 1 1 156 0" fill="none"/>
    <path id="ring-bottom" d="M 100 100 m 78 0 a 78 78 0 1 1 -156 0" fill="none"/>
  </defs>

  <!-- Outer ring -->
  <circle cx="100" cy="100" r="96" fill="#062e49"/>
  <circle cx="100" cy="100" r="78" fill="url(#sky)"/>

  <!-- Sun -->
  <circle cx="100" cy="82" r="20" fill="#f4b740"/>

  <!-- Sea with waves -->
  <clipPath id="disc"><circle cx="100" cy="100" r="78"/></clipPath>
  <g clip-path="url(#disc)">
    <path d="M 22 118 Q 50 104 78 118 T 134 118 T 190 118 L 190 190 L 22 190 Z" fill="url(#sea)"/>
    <path d="M 22 132 Q 50 120 78 132 T 134 132 T 190 132" fill="none" stroke="#3d7fae" stroke-width="3" opacity="0.7"/>
    <path d="M 22 148 Q 50 136 78 148 T 134 148 T 190 148" fill="none" stroke="#3d7fae" stroke-width="3" opacity="0.5"/>
  </g>

  <!-- Crossed oar and paddle -->
  <g stroke="#f4f7f9" stroke-width="5.5" stroke-linecap="round" fill="#f4f7f9">
    <line x1="66" y1="150" x2="128" y2="70"/>
    <line x1="134" y1="150" x2="72" y2="70"/>
  </g>
  <path d="M 62 156 l -10 -6 l 12 -12 l 8 8 Z" fill="#c9773a"/>
  <path d="M 138 156 l 10 -6 l -12 -12 l -8 8 Z" fill="#c9773a"/>

  <!-- Ring text -->
  <text font-family="Georgia, 'Times New Roman', serif" font-weight="700" fill="#eaf4fb" letter-spacing="2.5">
    <textPath href="#ring-top" startOffset="50%" text-anchor="middle" font-size="15">CLUBE&#160;NÁUTICO</textPath>
  </text>
  <text font-family="Georgia, 'Times New Roman', serif" font-weight="700" fill="#eaf4fb" letter-spacing="2.5">
    <textPath href="#ring-bottom" startOffset="50%" text-anchor="middle" font-size="15">PRAIA&#160;DE&#160;MIRA</textPath>
  </text>
  <circle cx="26" cy="100" r="2.4" fill="#f4b740"/>
  <circle cx="174" cy="100" r="2.4" fill="#f4b740"/>
</svg>
